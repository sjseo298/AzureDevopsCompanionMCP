name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [17, 21]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload JAR artifact (Java ${{ matrix.java-version }})
        uses: actions/upload-artifact@v4
        with:
          name: jar-java${{ matrix.java-version }}
          path: build/libs/*.jar
          retention-days: 5

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release JAR
        run: ./gradlew clean bootJar -x test --no-daemon

      - name: Determine version and prerelease flag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if echo "$VERSION" | grep -qE '(alpha|beta|rc)'; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Rename JAR with version info
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          JAR_FILE=$(ls build/libs/*.jar | head -1)
          cp "$JAR_FILE" "AzureDevopsCompanionMCP-${VERSION}.jar"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AzureDevops Companion MCP v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## AzureDevops Companion MCP v${{ steps.version.outputs.version }}

            ### Requirements
            - Java 17 or later (Java 21 LTS recommended)
            - Azure DevOps Personal Access Token (PAT)

            ### Quick Start
            ```bash
            # Download the JAR below and run with:
            java -jar AzureDevopsCompanionMCP-${{ steps.version.outputs.version }}.jar \
              --AZURE_DEVOPS_ORGANIZATION=your-org \
              --AZURE_DEVOPS_PAT=your-pat
            ```

            ### Environment Variables
            | Variable | Required | Description |
            |---|---|---|
            | `AZURE_DEVOPS_ORGANIZATION` | Yes | Your Azure DevOps organization name |
            | `AZURE_DEVOPS_PAT` | Yes | Personal Access Token |
            | `AZURE_DEVOPS_API_VERSION` | No | API version (default: `7.2-preview.1`) |
            | `AZURE_DEVOPS_VSSPS_API_VERSION` | No | VSSPS API version (default: `7.1`) |

            ### Java Compatibility
            Built with Java 21, targets Java 17 bytecode — runs on **Java 17, 21, 23+**.
          files: AzureDevopsCompanionMCP-${{ steps.version.outputs.version }}.jar
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
